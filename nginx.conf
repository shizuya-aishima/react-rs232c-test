# =============================================================================
# nginx 設定 - SPA（Single Page Application）向け
#
# React アプリはクライアントサイドルーティングを使用するため、
# 全てのパスで index.html を返す必要がある（try_files による SPA フォールバック）。
# =============================================================================

server {
    # コンテナ内でリッスンするポート（非特権ポート）
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA ルーティング: 存在するファイル/ディレクトリがない場合は index.html を返す。
    # これにより /settings や /monitor 等のクライアントサイドルートが正しく動作する。
    # React Router 等のルーティングライブラリ導入時に必要となる設定。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静的アセットの長期キャッシュ設定。
    # Vite はビルド時にファイル名にコンテンツハッシュを付与する（例: index-rYpU5Guq.js）。
    # ハッシュによりファイル内容が変われば URL も変わるため、
    # immutable + 1年間の長期キャッシュを安全に適用できる。
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gzip 圧縮によるレスポンスサイズの削減。
    # テキストベースのアセット（JS, CSS, HTML 等）を圧縮して転送量を削減する。
    # gzip_min_length で小さすぎるファイルの圧縮オーバーヘッドを回避。
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
}
